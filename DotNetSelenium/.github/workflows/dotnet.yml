name: Selenium Tests

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      working-directory: C:\Users\adhi5\source\repos\DotNetSelenium\DotNetSelenium\DotNetSelenium.csproj
      run: dotnet restore

    - name: Build project
      working-directory: C:\Users\adhi5\source\repos\DotNetSelenium\DotNetSelenium\DotNetSelenium.csproj
      run: dotnet build --no-restore

    - name: Run tests
      working-directory: C:\Users\adhi5\source\repos\DotNetSelenium\DotNetSelenium\DotNetSelenium.csproj
      run: dotnet test --no-build