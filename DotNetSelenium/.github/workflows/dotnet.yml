name: Selenium Tests

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore $(find . -name "*.csproj" | head -1)

    - name: Build project
      run: dotnet build $(find . -name "*.csproj" | head -1) --no-restore

    - name: Run tests
      run: dotnet test $(find . -name "*.csproj" | head -1) --no-build --verbosity normal