name: Selenium Tests

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore DotNetSelenium/DotNetSelenium.csproj

    - name: Build project
      run: dotnet build DotNetSelenium/DotNetSelenium.csproj --no-restore

    - name: Run tests
      run: dotnet test DotNetSelenium/DotNetSelenium.csproj --no-build --verbosity normal